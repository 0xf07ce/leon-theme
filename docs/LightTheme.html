<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon Light — Theme Reference</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f4f4;
    color: #222;
  }
  header {
    padding: 20px 28px;
    background: #fff;
    border-bottom: 1px solid #ddd;
  }
  header h1 { margin: 0 0 4px; font-size: 20px; }
  header p { margin: 0; color: #666; font-size: 13px; }
  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    height: calc(100vh - 74px);
  }
  .panel-left {
    overflow-y: auto;
    padding: 16px 20px 60px;
    border-right: 1px solid #ddd;
    background: #fafafa;
  }
  .panel-right {
    overflow-y: auto;
    padding: 24px;
  }
  h2.section {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #888;
    margin: 22px 0 8px;
    border-bottom: 1px solid #e2e2e2;
    padding-bottom: 6px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
  }
  .swatch {
    width: 34px; height: 34px;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,.15);
    padding: 0;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .label {
    flex: 1 1 auto;
    min-width: 0;
  }
  .label .name { font-size: 13px; font-weight: 600; }
  .label .desc { font-size: 11px; color: #999; }
  .hex {
    width: 84px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    padding: 5px 6px;
    border: 1px solid #ccc;
    border-radius: 5px;
    text-transform: uppercase;
  }
  .rgb {
    width: 118px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: #777;
    text-align: right;
  }
  /* Code preview */
  .preview-wrap {
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,.12);
  }
  .preview-title {
    padding: 8px 14px;
    font-size: 12px;
    font-family: ui-monospace, monospace;
    background: var(--ui-gutter);
    color: var(--fg);
    border-bottom: 1px solid rgba(0,0,0,.08);
  }
  pre.code {
    margin: 0;
    padding: 18px 20px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13.5px;
    line-height: 1.65;
    background: var(--bg);
    color: var(--fg);
    overflow-x: auto;
  }
  .ln { color: var(--ui-linenr); user-select: none; display: inline-block; width: 2.2em; text-align: right; margin-right: 1.2em; }
  .cmt { color: var(--c-comment); font-style: italic; }
  .doc { color: var(--c-doc); font-style: italic; }
  .kw  { color: var(--c-keyword); }
  .str { color: var(--c-string); }
  .esc { color: var(--c-escape); }
  .num { color: var(--c-number); }
  .cst { color: var(--c-constant); }
  .fn  { color: var(--c-function); }
  .cls { color: var(--c-class); }
  .ifc { color: var(--c-interface); }
  .ns  { color: var(--c-namespace); }
  .par { color: var(--c-parameter); font-style: italic; }
  .slf { color: var(--c-self); }
  .prp { color: var(--c-property); }
  .att { color: var(--c-attribute); }
  .dec { color: var(--c-decorator); text-decoration: underline; }
  .note { font-size:11px; color:#aaa; margin-top:10px; }
</style>
</head>
<body>
<header>
  <h1>Leon Light — Theme Reference &amp; Live Playground</h1>
  <p>요소별 색상을 편집하면 오른쪽 코드 프리뷰에 즉시 반영됩니다. (변경값은 저장되지 않습니다 · 새로고침 시 원복)</p>
</header>

<div class="layout">
  <div class="panel-left" id="controls"></div>
  <div class="panel-right">
    <div class="preview-wrap">
      <div class="preview-title">preview.ts / preview.py</div>
      <pre class="code" id="preview"></pre>
    </div>
    <p class="note">RGB 값은 HEX에서 자동 계산됩니다. HEX 입력칸에 직접 값을 넣거나 스와치를 클릭해 색을 고르세요.</p>
  </div>
</div>

<script>
// ---- Theme element data (from vscode/themes/Leon-Light-color-theme.json) ----
const GROUPS = [
  { section: "Editor / UI", items: [
    { var: "--bg",         name: "Background",     desc: "editor.background",  hex: "#f7f3e9" },
    { var: "--fg",         name: "Foreground",     desc: "editor.foreground / text", hex: "#2e2e2e" },
    { var: "--ui-gutter",  name: "Gutter",         desc: "editorGutter.background", hex: "#f2eede" },
    { var: "--ui-linenr",  name: "Line number",    desc: "editorLineNumber.foreground", hex: "#9a9a9a" },
  ]},
  { section: "Comments", items: [
    { var: "--c-comment",  name: "Comment",        desc: "comment", hex: "#a0a0a0" },
    { var: "--c-doc",      name: "Doc comment",    desc: "comment.documentation (italic)", hex: "#9fb2ac" },
  ]},
  { section: "Keywords & Constants", items: [
    { var: "--c-keyword",  name: "Keyword",        desc: "keyword, storage, tag → 비비드 그린", hex: "#009610" },
    { var: "--c-constant", name: "Constant",       desc: "constant.language / other → 보라", hex: "#8000c2" },
    { var: "--c-decorator",name: "Decorator",      desc: "meta.decorator (underline) → 시안", hex: "#0a6e7a" },
  ]},
  { section: "Strings & Numbers", items: [
    { var: "--c-string",   name: "String",         desc: "string, escape, YAML → 검정", hex: "#000000" },
    { var: "--c-escape",   name: "String escape",  desc: "constant.character.escape → 검정", hex: "#000000" },
    { var: "--c-number",   name: "Number",         desc: "constant.numeric → 앰버 오렌지", hex: "#e06600" },
  ]},
  { section: "Functions", items: [
    { var: "--c-function", name: "Function / Method", desc: "entity.name.function → 핑크", hex: "#e0218a" },
  ]},
  { section: "Types", items: [
    { var: "--c-class",    name: "Class / Struct / Enum / Type", desc: "entity.name.type/class → 선명한 파랑", hex: "#0036e0" },
    { var: "--c-interface",name: "Interface",      desc: "interface, decorator → 시안", hex: "#0a6e7a" },
    { var: "--c-namespace",name: "Namespace",      desc: "entity.name.namespace (C++) → 그레이시 틸", hex: "#357b88" },
  ]},
  { section: "Variables & Members", items: [
    { var: "--c-parameter",name: "Parameter / Variable", desc: "variable, parameter → 브라운", hex: "#9d7124" },
    { var: "--c-self",     name: "this / self",    desc: "variable.language.this/self → 브라운", hex: "#9d7124" },
    { var: "--c-property", name: "Property (JS/TS)", desc: "variable.other.property → 브라운", hex: "#9d7124" },
    { var: "--c-attribute",name: "HTML attribute", desc: "entity.other.attribute-name", hex: "#7b3005" },
  ]},
];

// ---- Code sample (spans reference token classes) ----
const CODE = `<span class="ln">1</span><span class="cmt">// Leon Light — syntax sample</span>
<span class="ln">2</span><span class="doc">/** Represents an RGB color triplet */</span>
<span class="ln">3</span><span class="kw">import</span> { <span class="cls">Color</span> } <span class="kw">from</span> <span class="str">"./color"</span>;
<span class="ln">4</span>
<span class="ln">5</span><span class="kw">export</span> <span class="kw">interface</span> <span class="ifc">Palette</span> {
<span class="ln">6</span>  <span class="prp">name</span>: <span class="cls">string</span>;
<span class="ln">7</span>  <span class="prp">size</span>: <span class="cls">number</span>;
<span class="ln">8</span>}
<span class="ln">9</span>
<span class="ln">10</span><span class="kw">enum</span> <span class="cls">Mode</span> { <span class="cst">Light</span>, <span class="cst">Dark</span> }
<span class="ln">11</span>
<span class="ln">12</span><span class="dec">@sealed</span>
<span class="ln">13</span><span class="kw">class</span> <span class="cls">Theme</span> <span class="kw">implements</span> <span class="ifc">Palette</span> {
<span class="ln">14</span>  <span class="kw">private</span> <span class="prp">mode</span>: <span class="cls">Mode</span> = <span class="cst">Mode</span>.<span class="cst">Light</span>;
<span class="ln">15</span>
<span class="ln">16</span>  <span class="fn">render</span>(<span class="par">count</span>: <span class="cls">number</span>): <span class="cls">string</span> {
<span class="ln">17</span>    <span class="kw">const</span> <span class="par">tag</span> = <span class="str">\`items: \${</span><span class="par">count</span><span class="str">}\\n\`</span>;
<span class="ln">18</span>    <span class="slf">this</span>.<span class="fn">log</span>(<span class="num">0xFF</span>, <span class="num">42.5</span>);
<span class="ln">19</span>    <span class="kw">return</span> <span class="slf">this</span>.<span class="prp">name</span> + <span class="str">"\\t"</span> + <span class="esc">"\\u00A0"</span>;
<span class="ln">20</span>  }
<span class="ln">21</span>}
<span class="ln">22</span>
<span class="ln">23</span><span class="cmt"># python flavor</span>
<span class="ln">24</span><span class="ns">os</span>.<span class="fn">getcwd</span>(); <span class="dec">@staticmethod</span>
<span class="ln">25</span><span class="kw">def</span> <span class="fn">build</span>(<span class="slf">self</span>, <span class="par">opts</span>):
<span class="ln">26</span>    <span class="kw">return</span> <span class="fn">Theme</span>(<span class="att">mode</span>=<span class="cst">Mode</span>.<span class="cst">Dark</span>)
<span class="ln">27</span>
<span class="ln">28</span><span class="cmt">// c++ namespace sample</span>
<span class="ln">29</span><span class="kw">namespace</span> <span class="ns">leon</span>::<span class="ns">theme</span> {
<span class="ln">30</span>  <span class="kw">class</span> <span class="cls">Palette</span> {
<span class="ln">31</span>    <span class="cls">std</span>::<span class="cls">string</span> <span class="fn">name</span>() <span class="kw">const</span> { <span class="kw">return</span> <span class="str">"leon"</span>; }
<span class="ln">32</span>  };
<span class="ln">33</span>}
<span class="ln">34</span><span class="ns">leon</span>::<span class="ns">theme</span>::<span class="cls">Palette</span> <span class="fn">make</span>(<span class="ns">std</span>::<span class="cls">string</span> <span class="par">id</span>);`;

// ---- Render controls ----
const root = document.documentElement;
function hexToRgb(h){
  h = h.replace('#','');
  if(h.length===3) h = h.split('').map(c=>c+c).join('');
  const n = parseInt(h,16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function setVar(v, hex){ root.style.setProperty(v, hex); }

const controls = document.getElementById('controls');
GROUPS.forEach(g=>{
  const h = document.createElement('h2');
  h.className='section'; h.textContent=g.section;
  controls.appendChild(h);
  g.items.forEach(it=>{
    setVar(it.var, it.hex);
    const row = document.createElement('div'); row.className='row';
    const sw = document.createElement('input');
    sw.type='color'; sw.className='swatch'; sw.value=it.hex;
    const lab = document.createElement('div'); lab.className='label';
    lab.innerHTML = `<div class="name">${it.name}</div><div class="desc">${it.desc}</div>`;
    const hex = document.createElement('input');
    hex.type='text'; hex.className='hex'; hex.value=it.hex;
    const rgb = document.createElement('span'); rgb.className='rgb';
    const updateRgb = (hx)=>{ const [r,gg,b]=hexToRgb(hx); rgb.textContent=`rgb(${r}, ${gg}, ${b})`; };
    updateRgb(it.hex);
    const apply = (hx)=>{ setVar(it.var, hx); updateRgb(hx); };
    sw.addEventListener('input', e=>{ hex.value=e.target.value; apply(e.target.value); });
    hex.addEventListener('input', e=>{
      let val = e.target.value.trim();
      if(!val.startsWith('#')) val = '#'+val;
      if(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(val)){ sw.value = val.length===4 ? '#'+val.slice(1).split('').map(c=>c+c).join('') : val; apply(val); }
    });
    row.append(sw, lab, hex, rgb);
    controls.appendChild(row);
  });
});

document.getElementById('preview').innerHTML = CODE;
</script>
</body>
</html>
